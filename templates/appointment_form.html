{% extends "base.html" %}

{% block title %}Schedule Appointment - Session Tracking System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h2><i class="fas fa-calendar-plus"></i> Schedule Appointment</h2>
        <hr>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="patient_id" class="form-label">Patient *</label>
                        <select class="form-control" id="patient_id" name="patient_id" required>
                            <option value="">Select Patient</option>
                            {% for patient in patients %}
                            <option value="{{ patient.id }}">{{ patient.first_name }} {{ patient.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="appointment_date" class="form-label">Date & Time *</label>
                        <input type="datetime-local" class="form-control" id="appointment_date" name="appointment_date" required>
                    </div>
                    <div class="mb-3">
                        <label for="appointment_type" class="form-label">Type *</label>
                        <select class="form-control" id="appointment_type" name="appointment_type" required>
                            <option value="">Select Type</option>
                            <option value="initial">Initial Consultation</option>
                            <option value="follow-up">Follow-up</option>
                            <option value="session">Therapy Session</option>
                            <option value="review">Review</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Schedule</button>
                        <a href="{{ url_for('appointments') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
